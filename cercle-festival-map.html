<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cercle Festival 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08080f;--surface:#111122;--surface2:#1a1a30;
  --accent:#c8a96e;--accent2:#7b6fd4;
  --text:#f0ede8;--muted:#666;--border:rgba(200,169,110,0.2);
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{color:var(--text);font-family:'Space Grotesk',sans-serif}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:rgba(8,8,15,0.97);
  border-bottom:1px solid var(--border);z-index:100;flex-shrink:0;
}
.logo{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:0.12em;color:var(--accent);text-transform:uppercase}
.logo span{color:var(--muted)}
.badge{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);padding:5px 12px;border-radius:20px;font-size:12px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:blink 2s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

/* MAP CONTAINER */
#map-wrap{
  flex:1;min-height:0;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);cursor:crosshair;
}
#world-svg{
  width:100%;height:100%;
  user-select:none;-webkit-user-select:none;
  touch-action:none;
}
/* pays */
#world-svg path{fill:#1a1f35;stroke:#0d1020;stroke-width:0.3;transition:fill 0.15s}
#world-svg path:hover{fill:#252c48}
#world-svg path.selected{fill:#2a2010}

/* PINS */
.pin-dot{
  position:absolute;pointer-events:none;
  width:12px;height:12px;border-radius:50%;
  transform:translate(-50%,-50%);
  border:2px solid #c8a96e;background:rgba(200,169,110,0.45);
  box-shadow:0 0 6px rgba(200,169,110,0.5);
}
.pin-dot.ig{border-color:#fd1d1d;background:rgba(253,29,29,0.4);box-shadow:0 0 6px rgba(253,29,29,0.4)}

/* TEMP PIN (draggable) */
#temp-pin{
  position:absolute;display:none;
  width:26px;height:26px;border-radius:50%;
  transform:translate(-50%,-50%);
  border:2.5px solid var(--accent);background:rgba(200,169,110,0.45);
  box-shadow:0 0 0 8px rgba(200,169,110,0.1);
  cursor:grab;z-index:10;
}
#temp-pin.dragging{cursor:grabbing;box-shadow:0 0 0 12px rgba(200,169,110,0.08)}

/* HINT */
#hint{
  position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
  background:rgba(17,17,34,0.93);border:1px solid var(--border);
  border-radius:24px;padding:9px 18px;font-size:13px;color:var(--muted);
  pointer-events:none;white-space:nowrap;transition:opacity 0.3s;z-index:5;
}
#hint strong{color:var(--accent)}
#hint.gone{opacity:0;pointer-events:none}

/* VALIDATE BAR */
#vbar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(8,8,15,0.97);border-top:1px solid var(--accent);
  padding:12px 16px 22px;z-index:200;
  display:flex;align-items:center;gap:10px;
  transform:translateY(110%);transition:transform 0.3s cubic-bezier(0.34,1.4,0.64,1);
}
#vbar.up{transform:translateY(0)}
#vbar .loc{flex:1;min-width:0}
#vbar .loc b{display:block;font-size:16px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#vbar .loc span{font-size:12px;color:var(--muted)}
.btn-x{background:none;border:none;color:var(--muted);font-size:26px;line-height:1;cursor:pointer;padding:2px 6px;flex-shrink:0}
.btn-ok{background:var(--accent);color:#000;border:none;border-radius:12px;padding:12px 18px;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:transform 0.1s,background 0.1s}
.btn-ok:active{transform:scale(0.95);background:#d4b87a}

/* DIM */
#dim{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:300;pointer-events:none;transition:background 0.3s}
#dim.on{background:rgba(0,0,0,0.65);pointer-events:all}

/* LOGIN SHEET */
#sheet{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:1px solid var(--border);
  border-radius:20px 20px 0 0;padding:0 20px 38px;z-index:400;
  transform:translateY(110%);transition:transform 0.38s cubic-bezier(0.34,1.15,0.64,1);
  max-height:90dvh;overflow-y:auto;
}
#sheet.up{transform:translateY(0)}
.handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 20px}
.flag{font-size:40px;text-align:center;margin-bottom:8px;line-height:1}
.stitle{font-size:22px;font-weight:600;text-align:center;margin-bottom:6px;line-height:1.2}
.ssub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:24px;line-height:1.5}

.btn-ig{
  width:100%;padding:15px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);
  color:#fff;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:10px;transition:opacity 0.15s,transform 0.1s;
}
.btn-ig:active{opacity:0.85;transform:scale(0.97)}
.or-row{display:flex;align-items:center;gap:8px;margin:2px 0 10px;color:var(--muted);font-size:12px}
.or-row::before,.or-row::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-gs{
  width:100%;padding:15px;border-radius:12px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:500;
  cursor:pointer;transition:border-color 0.15s,transform 0.1s;
}
.btn-gs:active{transform:scale(0.97);border-color:var(--accent)}

.step{display:none}.step.on{display:block}
input[type=text]{
  width:100%;padding:14px;background:var(--surface2);
  border:1px solid var(--border);border-radius:12px;
  color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:16px;
  outline:none;margin-bottom:10px;
}
input[type=text]:focus{border-color:var(--accent)}
input[type=text]::placeholder{color:var(--muted)}
.btn-go{
  width:100%;padding:15px;border-radius:12px;border:none;
  background:var(--accent);color:#000;
  font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;transition:transform 0.1s;
}
.btn-go:active{transform:scale(0.97)}
.btn-go:disabled{opacity:0.5}
.btn-back{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;display:block;margin:10px auto 0;text-decoration:underline}

/* TOAST */
#toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-10px);
  background:var(--surface2);border:1px solid var(--accent);border-radius:10px;
  padding:9px 16px;font-size:13px;z-index:500;white-space:nowrap;
  opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast strong{color:var(--accent)}

/* LEGEND */
#legend{
  position:fixed;bottom:28px;right:14px;
  background:rgba(17,17,34,0.93);border:1px solid var(--border);border-radius:10px;
  padding:9px 13px;font-size:11px;z-index:5;
}
.li{display:flex;align-items:center;gap:6px;color:var(--muted);margin-bottom:4px}
.li:last-child{margin:0}
.ld{width:8px;height:8px;border-radius:50%;border:2px solid;flex-shrink:0}
</style>
</head>

  const path = e.target.closest('path');
  if (path && SVG_COUNTRIES[path.id]) {
    const country = SVG_COUNTRIES[path.id];
    geoData = { city: '', country };
    setLoc(country, '');
    const lk = COUNTRY_LANG[country] || 'DEFAULT';
    curLang = LANGS[lk] || DEF;
  } else {
    reverseGeocode(pct);
  }
});

// ── Place le pin temporaire ─────────────────────────────────
function placePin(pct, cx, cy) {
  tempPct = pct;
  updatePinPos(pct);
  tempPin.style.display = 'block';
  document.getElementById('vbar').classList.add('up');
  document.getElementById('hint').classList.add('gone');
}

function updatePinPos(pct) {
  const rect = mapWrap.getBoundingClientRect();
  tempPin.style.left = (pct.x * rect.width / 100) + 'px';
  tempPin.style.top  = (pct.y * rect.height / 100) + 'px';
}

// ── Drag du pin ─────────────────────────────────────────────
tempPin.addEventListener('pointerdown', function(e) {
  e.stopPropagation();
  isDragging = true;
  tempPin.classList.add('dragging');
  tempPin.setPointerCapture(e.pointerId);
});
tempPin.addEventListener('pointermove', function(e) {
  if (!isDragging) return;
  const rect = mapWrap.getBoundingClientRect();
  const x = Math.max(0, Math.min(100, (e.clientX - rect.left) / rect.width * 100));
  const y = Math.max(0, Math.min(100, (e.clientY - rect.top)  / rect.height * 100));
  tempPct = {x, y};
  updatePinPos(tempPct);
  setLoc('…', '');
});
tempPin.addEventListener('pointerup', function(e) {
  if (!isDragging) return;
  isDragging = false;
  tempPin.classList.remove('dragging');
  reverseGeocode(tempPct);
});

// ── Convertit un event en % de la carte ────────────────────
function svgPercent(e) {
  const rect = mapWrap.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) / rect.width * 100,
    y: (e.clientY - rect.top)  / rect.height * 100,
  };
}

// Convertit % en coordonnées lat/lng approx (projection équirectangulaire)
function pctToLatLng(pct) {
  const lng = (pct.x / 100) * 360 - 180;
  const lat = 90 - (pct.y / 100) * 180;
  return { lat, lng };
}

function cancelPin() {
  tempPin.style.display = 'none';
  tempPct = null; geoData = {};
  document.getElementById('vbar').classList.remove('up');
  document.getElementById('hint').classList.remove('gone');
}

// ── Géocodage inverse ───────────────────────────────────────
function reverseGeocode(pct) {
  setLoc('…','');
  const {lat, lng} = pctToLatLng(pct);
  fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=en`)
    .then(r => r.json())
    .then(d => {
      const city    = d.address?.city || d.address?.town || d.address?.village || d.address?.county || '';
      const country = d.address?.country || '';
      geoData = { city, country };
      setLoc(city || country || '?', city ? country : '');
      const lk = COUNTRY_LANG[country] || 'DEFAULT';
      curLang = LANGS[lk] || DEF;
    })
    .catch(() => { geoData={}; setLoc('Unknown location',''); });
}

function setLoc(city, country) {
  document.getElementById('loc-city').textContent    = city;
  document.getElementById('loc-country').textContent = country;
}

// ── Sheet ───────────────────────────────────────────────────
function openSheet() {
  const L = curLang;
  document.getElementById('s-flag').textContent    = L[0];
  document.getElementById('s-title').textContent   = L[1];
  document.getElementById('s-sub').textContent     = L[2];
  document.getElementById('s-ig-btn').textContent  = L[3];
  document.getElementById('s-gs-btn').textContent  = L[4];
  document.getElementById('s-or').textContent      = L[5];
  document.getElementById('ig-go').textContent     = L[7];
  document.getElementById('ig-back').textContent   = L[6];
  document.getElementById('ig-val').placeholder    = '@' + L[8];
  document.getElementById('gs-go').textContent     = L[7];
  document.getElementById('gs-back').textContent   = L[6];
  document.getElementById('gs-val').placeholder    = L[9];
  goS0();
  document.getElementById('sheet').classList.add('up');
  document.getElementById('dim').classList.add('on');
  document.getElementById('vbar').classList.remove('up');
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('up');
  document.getElementById('dim').classList.remove('on');
  if (tempPct) document.getElementById('vbar').classList.add('up');
}

function goS0()  { ['s0','s1','s2'].forEach(i=>document.getElementById(i).classList.remove('on')); document.getElementById('s0').classList.add('on'); }
function goIg()  { ['s0','s1','s2'].forEach(i=>document.getElementById(i).classList.remove('on')); document.getElementById('s1').classList.add('on'); setTimeout(()=>document.getElementById('ig-val').focus(),80); }
function goGuest(){ ['s0','s1','s2'].forEach(i=>document.getElementById(i).classList.remove('on')); document.getElementById('s2').classList.add('on'); setTimeout(()=>document.getElementById('gs-val').focus(),80); }

// ── Submit ──────────────────────────────────────────────────
async function submitIg() {
  const raw = document.getElementById('ig-val').value.trim();
  if (!raw) return;
  await savePin(raw.startsWith('@') ? raw : '@'+raw, 'instagram', 'ig-go');
}
async function submitGuest() {
  const n = document.getElementById('gs-val').value.trim();
  if (!n) return;
  await savePin(n, 'guest', 'gs-go');
}

async function savePin(name, type, btnId) {
  if (!tempPct) return;
  const btn = document.getElementById(btnId);
  btn.disabled = true; btn.textContent = '…';
  const {lat, lng} = pctToLatLng(tempPct);
  const pin = { lat, lng, name, type, city:geoData.city||'', country:geoData.country||'' };

  if (db) {
    const { error } = await db.from('pins').insert([pin]);
    if (error) { showToast('Error — try again'); btn.disabled=false; btn.textContent=curLang[7]; return; }
  } else {
    addDot(tempPct, type, name, geoData.city||geoData.country||'?');
    document.getElementById('cnt').textContent = parseInt(document.getElementById('cnt').textContent)+1;
    showToast(`<strong>${esc(name)}</strong> · ${esc(geoData.city||geoData.country||'?')}`);
  }

  tempPin.style.display='none'; tempPct=null; geoData={};
  document.getElementById('ig-val').value='';
  document.getElementById('gs-val').value='';
  btn.disabled=false; btn.textContent=curLang[7];
  closeSheet();
  document.getElementById('hint').classList.remove('gone');
}

// ── Affiche un dot permanent sur la carte ───────────────────
function addDot(pct, type, name, loc) {
  const dot = document.createElement('div');
  dot.className = 'pin-dot' + (type==='instagram' ? ' ig' : '');
  dot.style.left = pct.x + '%';
  dot.style.top  = pct.y + '%';
  dot.title = `${name} · ${loc}`;
  mapWrap.appendChild(dot);
}

// Convertit lat/lng en % pour afficher les pins chargés depuis Supabase
function latLngToPct(lat, lng) {
  return {
    x: (lng + 180) / 360 * 100,
    y: (90 - lat) / 180 * 100,
  };
}

// ── Toast ───────────────────────────────────────────────────
function showToast(msg) {
  const t=document.getElementById('toast');
  t.innerHTML=msg; t.classList.add('on');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),3000);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── Supabase en différé ─────────────────────────────────────
(function(){
  const s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
  s.onload=function(){
    try {
      db = supabase.createClient(SB_URL, SB_KEY);
      db.from('pins').select('*').order('created_at').then(({data,error})=>{
        if(error||!data) return;
        data.forEach(p => addDot(latLngToPct(p.lat,p.lng), p.type, p.name, p.city||p.country||'?'));
        document.getElementById('cnt').textContent = data.length;
      });
      db.channel('pins-live')
        .on('postgres_changes',{event:'INSERT',schema:'public',table:'pins'}, p=>{
          addDot(latLngToPct(p.new.lat,p.new.lng), p.new.type, p.new.name, p.new.city||p.new.country||'?');
          document.getElementById('cnt').textContent=parseInt(document.getElementById('cnt').textContent)+1;
          showToast(`<strong>${esc(p.new.name)}</strong> · ${esc(p.new.city||p.new.country||'?')}`);
        })
        .subscribe();
    } catch(e){ console.warn('Supabase error:',e); }
  };
  document.head.appendChild(s);
})();
</script>
